<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glossy AI</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            bg: '#f0f4f9',
                            darkbg: '#131314',
                            sidebar: '#e3e3e3',
                            darksidebar: '#1e1f20',
                            userbubble: '#f0f4f9',
                            darkuserbubble: '#1e1f20',
                            aibubble: '#ffffff',
                            darkaibubble: '#131314'
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>

    <style>
        body { margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Markdown Code Styles */
        .prose pre {
            background-color: #1e1f20;
            color: #e5e7eb;
            border-radius: 0.75rem;
            padding: 1rem;
            overflow-x: auto;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .prose code {
            background-color: rgba(156, 163, 175, 0.2);
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }
        .prose pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }
        .prose p { margin-top: 0.5rem; margin-bottom: 0.5rem; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Loader Animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .loader-ring::before {
            content: '';
            position: absolute;
            left: -20%; top: -20%; width: 140%; height: 140%;
            border-radius: 50%;
            background-color: #3b82f6;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            z-index: -1;
        }

        /* Auto-resize textarea cleanup */
        textarea { resize: none; }
        textarea:focus { outline: none; box-shadow: none; }
        
        /* Message slide-in */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-animate { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-white dark:bg-gemini-darkbg text-gray-800 dark:text-gray-100 font-sans transition-colors duration-200">

    <div id="loading" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white dark:bg-gemini-darkbg">
        <div class="relative w-12 h-12 rounded-full bg-blue-500 loader-ring mb-4"></div>
        <div class="text-lg font-medium text-gray-600 dark:text-gray-300">Initializing AI...</div>
    </div>

    <div id="app" class="hidden flex min-h-[100dvh] w-full">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-gemini-sidebar dark:bg-gemini-darksidebar transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col h-[100dvh]">
            <div class="p-4 flex items-center justify-between">
                <button id="new-chat-btn" class="flex items-center gap-2 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-800 dark:text-white px-4 py-3 rounded-full shadow-sm w-full transition-colors duration-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span class="font-medium">New Chat</span>
                </button>
                <button id="close-sidebar-btn" class="md:hidden p-2 text-gray-600 dark:text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="px-4 pb-2 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Recent</div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1">
                </div>

            <div class="p-4 border-t border-gray-300 dark:border-gray-700/50 space-y-2">
                <button id="theme-toggle" class="flex items-center gap-3 w-full px-3 py-2 text-left rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <svg id="theme-icon-dark" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg id="theme-icon-light" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span id="theme-text">Toggle Theme</span>
                </button>
                <button id="settings-btn" class="flex items-center gap-3 w-full px-3 py-2 text-left rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 md:ml-72 min-h-[100dvh] relative">
            
            <header class="md:hidden sticky top-0 z-20 flex items-center justify-between p-3 bg-white/80 dark:bg-gemini-darkbg/80 backdrop-blur border-b border-gray-200 dark:border-gray-800">
                <button id="hamburger-btn" class="p-2 text-gray-600 dark:text-gray-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="font-semibold text-lg text-gray-800 dark:text-gray-100">Universal AI</h1>
                <div class="w-10"></div> </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-8 flex flex-col gap-6 w-full max-w-4xl mx-auto pb-8">
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-0 transition-opacity duration-500">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white text-3xl shadow-lg">
                        ✨
                    </div>
                    <h2 class="text-3xl font-bold text-gray-800 dark:text-gray-100">How can I help you today?</h2>
                    <p class="text-gray-500 dark:text-gray-400 max-w-md">Welcome To Glossy AI.</p>
                </div>
                </div>

            <div class="sticky bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-darkbg dark:via-gemini-darkbg pt-6 pb-4 sm:pb-6 px-4 sm:px-8">
                <div class="max-w-4xl mx-auto relative">
                    <div class="relative flex items-end bg-gemini-bg dark:bg-gemini-darkuserbubble rounded-[28px] border border-gray-200 dark:border-gray-700 focus-within:ring-2 focus-within:ring-blue-500/50 shadow-sm transition-shadow pr-2 pl-4 py-2">
                        <textarea id="message-input" rows="1" class="w-full max-h-[200px] bg-transparent text-gray-800 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 border-none outline-none py-3 resize-none custom-scrollbar" placeholder="Enter a prompt here..."></textarea>
                        
                        <div class="flex items-center gap-1 pb-1 pl-2">
                            <button id="send-btn" class="p-3 bg-blue-500 hover:bg-blue-600 text-white rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed hidden flex-shrink-0">
                                <svg class="w-5 h-5 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            </button>
                            <button id="stop-btn" class="p-3 bg-red-500 hover:bg-red-600 text-white rounded-full transition-colors hidden flex-shrink-0">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="text-center text-xs text-gray-400 dark:text-gray-500 mt-2">
                        AI can make mistakes. Consider verifying important information.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[60] bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity opacity-0">
        <div class="bg-white dark:bg-gray-900 w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                <h3 class="text-xl font-semibold text-gray-800 dark:text-white">Settings</h3>
                <button id="close-settings-btn" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-6 custom-scrollbar">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">OpenRouter API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="api-key-input" class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all dark:text-white" placeholder="sk-or-v1-...">
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Your key is stored locally in your browser.</p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Model</label>
                    <input type="text" id="model-input" class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white" placeholder="deepseek/deepseek-r1:free">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Global System Prompt</label>
                    <textarea id="system-prompt-input" rows="4" class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white resize-y" placeholder="You are a helpful AI assistant..."></textarea>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-800 flex justify-end gap-3 bg-gray-50 dark:bg-gray-800/50">
                <button id="cancel-settings-btn" class="px-4 py-2 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors">Cancel</button>
                <button id="save-settings-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Use an IIFE to keep scope clean and catch init errors
        (function() {
            // ==========================================
            // STATE MANAGEMENT
            // ==========================================
            const defaultSettings = {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful, harmless, and honest AI assistant.',
                theme: 'system'
            };

            let state = {
                chats: [],
                currentChatId: null,
                settings: { ...defaultSettings }
            };

            let abortController = null;

            // ==========================================
            // DOM ELEMENTS
            // ==========================================
            const els = {
                app: document.getElementById('app'),
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                hamburgerBtn: document.getElementById('hamburger-btn'),
                closeSidebarBtn: document.getElementById('close-sidebar-btn'),
                chatList: document.getElementById('chat-list'),
                newChatBtn: document.getElementById('new-chat-btn'),
                themeToggle: document.getElementById('theme-toggle'),
                themeIconDark: document.getElementById('theme-icon-dark'),
                themeIconLight: document.getElementById('theme-icon-light'),
                settingsBtn: document.getElementById('settings-btn'),
                settingsModal: document.getElementById('settings-modal'),
                closeSettingsBtn: document.getElementById('close-settings-btn'),
                cancelSettingsBtn: document.getElementById('cancel-settings-btn'),
                saveSettingsBtn: document.getElementById('save-settings-btn'),
                apiKeyInput: document.getElementById('api-key-input'),
                modelInput: document.getElementById('model-input'),
                systemPromptInput: document.getElementById('system-prompt-input'),
                chatContainer: document.getElementById('chat-container'),
                welcomeScreen: document.getElementById('welcome-screen'),
                messageInput: document.getElementById('message-input'),
                sendBtn: document.getElementById('send-btn'),
                stopBtn: document.getElementById('stop-btn')
            };

            // ==========================================
            // UTILITIES
            // ==========================================
            const generateId = () => Math.random().toString(36).substring(2, 15);
            
            const loadData = () => {
                try {
                    const savedChats = localStorage.getItem('uniAi_chats');
                    const savedSettings = localStorage.getItem('uniAi_settings');
                    const savedCurrentChatId = localStorage.getItem('uniAi_currentChatId');
                    
                    if (savedChats) state.chats = JSON.parse(savedChats);
                    if (savedSettings) state.settings = { ...defaultSettings, ...JSON.parse(savedSettings) };
                    if (savedCurrentChatId) state.currentChatId = savedCurrentChatId;
                    
                    if (state.chats.length === 0) createNewChat();
                    if (!state.currentChatId || !state.chats.find(c => c.id === state.currentChatId)) {
                        state.currentChatId = state.chats[0]?.id;
                    }
                } catch (e) {
                    console.error("Failed to load local storage", e);
                    createNewChat();
                }
            };

            const saveData = () => {
                try {
                    localStorage.setItem('uniAi_chats', JSON.stringify(state.chats));
                    localStorage.setItem('uniAi_settings', JSON.stringify(state.settings));
                    localStorage.setItem('uniAi_currentChatId', state.currentChatId);
                } catch (e) {
                    console.error("Failed to save to local storage", e);
                }
            };

            const scrollToBottom = () => {
                els.chatContainer.scrollTo({ top: els.chatContainer.scrollHeight, behavior: 'smooth' });
            };

            const autoResizeTextarea = () => {
                els.messageInput.style.height = 'auto';
                els.messageInput.style.height = (els.messageInput.scrollHeight) + 'px';
                
                // Toggle Send Button visibility
                if (els.messageInput.value.trim() !== '') {
                    els.sendBtn.classList.remove('hidden');
                } else {
                    els.sendBtn.classList.add('hidden');
                }
            };

            // ==========================================
            // THEME MANAGEMENT
            // ==========================================
            const applyTheme = () => {
                const isDark = state.settings.theme === 'dark' || 
                    (state.settings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    els.themeIconLight.classList.remove('hidden');
                    els.themeIconDark.classList.add('hidden');
                    document.getElementById('theme-text').textContent = 'Light Mode';
                } else {
                    document.documentElement.classList.remove('dark');
                    els.themeIconDark.classList.remove('hidden');
                    els.themeIconLight.classList.add('hidden');
                    document.getElementById('theme-text').textContent = 'Dark Mode';
                }
            };

            const toggleTheme = () => {
                const isDark = document.documentElement.classList.contains('dark');
                state.settings.theme = isDark ? 'light' : 'dark';
                saveData();
                applyTheme();
            };

            // ==========================================
            // SIDEBAR MANAGEMENT
            // ==========================================
            const toggleSidebar = (show) => {
                if (show) {
                    els.sidebar.classList.remove('-translate-x-full');
                    els.sidebarOverlay.classList.remove('hidden');
                    // Small delay to allow display:block to apply before opacity transition
                    setTimeout(() => els.sidebarOverlay.classList.remove('opacity-0'), 10);
                } else {
                    els.sidebar.classList.add('-translate-x-full');
                    els.sidebarOverlay.classList.add('opacity-0');
                    setTimeout(() => els.sidebarOverlay.classList.add('hidden'), 300);
                }
            };

            // ==========================================
            // CHAT MANAGEMENT
            // ==========================================
            const createNewChat = () => {
                const newChat = {
                    id: generateId(),
                    title: 'New Chat',
                    messages: [],
                    updatedAt: Date.now()
                };
                state.chats.unshift(newChat);
                state.currentChatId = newChat.id;
                saveData();
                renderChatList();
                renderCurrentChat();
                if (window.innerWidth < 768) toggleSidebar(false);
                els.messageInput.focus();
            };

            const switchChat = (id) => {
                state.currentChatId = id;
                saveData();
                renderChatList();
                renderCurrentChat();
                if (window.innerWidth < 768) toggleSidebar(false);
            };

            const deleteChat = (id, event) => {
                event.stopPropagation();
                if (!confirm("Are you sure you want to delete this chat?")) return;
                
                state.chats = state.chats.filter(c => c.id !== id);
                if (state.chats.length === 0) {
                    createNewChat();
                } else if (state.currentChatId === id) {
                    state.currentChatId = state.chats[0].id;
                }
                saveData();
                renderChatList();
                renderCurrentChat();
            };

            const renameChat = (id, event) => {
                event.stopPropagation();
                const chat = state.chats.find(c => c.id === id);
                const newTitle = prompt("Enter new chat name:", chat.title);
                if (newTitle && newTitle.trim() !== '') {
                    chat.title = newTitle.trim();
                    saveData();
                    renderChatList();
                }
            };

            const renderChatList = () => {
                els.chatList.innerHTML = '';
                // Sort by updatedAt descending
                const sortedChats = [...state.chats].sort((a, b) => b.updatedAt - a.updatedAt);
                
                sortedChats.forEach(chat => {
                    const isActive = chat.id === state.currentChatId;
                    const div = document.createElement('div');
                    div.className = `group flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-blue-100/50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-200/50 dark:hover:bg-gray-800'}`;
                    div.onclick = () => switchChat(chat.id);
                    
                    div.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg class="w-4 h-4 flex-shrink-0 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                            <span class="truncate text-sm font-medium">${DOMPurify.sanitize(chat.title)}</span>
                        </div>
                        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="p-1 hover:text-blue-500" title="Rename" onclick="event.stopPropagation(); document.dispatchEvent(new CustomEvent('rename-chat', {detail: '${chat.id}'}))">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button class="p-1 hover:text-red-500" title="Delete" onclick="event.stopPropagation(); document.dispatchEvent(new CustomEvent('delete-chat', {detail: '${chat.id}'}))">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                    els.chatList.appendChild(div);
                });
            };

            // Custom events for inline handlers in string templates
            document.addEventListener('rename-chat', e => renameChat(e.detail, window.event));
            document.addEventListener('delete-chat', e => deleteChat(e.detail, window.event));

            // ==========================================
            // MESSAGING & RENDERING
            // ==========================================
            const getCurrentChat = () => state.chats.find(c => c.id === state.currentChatId);

            const renderCurrentChat = () => {
                const chat = getCurrentChat();
                if (!chat) return;

                // Clear container except welcome screen
                Array.from(els.chatContainer.children).forEach(child => {
                    if (child.id !== 'welcome-screen') child.remove();
                });

                if (chat.messages.length === 0) {
                    els.welcomeScreen.classList.remove('hidden');
                    setTimeout(() => els.welcomeScreen.classList.remove('opacity-0'), 10);
                } else {
                    els.welcomeScreen.classList.add('hidden');
                    els.welcomeScreen.classList.add('opacity-0');
                    
                    chat.messages.forEach(msg => appendMessageDOM(msg.role, msg.content, false));
                    scrollToBottom();
                }
            };

            const appendMessageDOM = (role, content, animate = true) => {
                const div = document.createElement('div');
                div.className = `flex gap-4 max-w-3xl w-full mx-auto ${animate ? 'msg-animate' : ''} ${role === 'user' ? 'flex-row-reverse' : 'flex-row'}`;
                
                const avatar = document.createElement('div');
                avatar.className = `flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-white ${role === 'user' ? 'bg-blue-600' : 'bg-gradient-to-br from-purple-500 to-blue-500'}`;
                avatar.innerHTML = role === 'user' 
                    ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>`
                    : `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L9.5 8.5 3 11l6.5 2.5L12 20l2.5-6.5L21 11l-6.5-2.5L12 2z"/></svg>`;

                const bubbleContainer = document.createElement('div');
                bubbleContainer.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} max-w-[85%]`;

                const bubble = document.createElement('div');
                if (role === 'user') {
                    bubble.className = "bg-gemini-bg dark:bg-gemini-darkuserbubble text-gray-800 dark:text-gray-100 px-5 py-3 rounded-2xl rounded-tr-sm break-words whitespace-pre-wrap text-[15px]";
                    bubble.textContent = content; // pure text for user
                } else {
                    bubble.className = "prose prose-sm sm:prose-base dark:prose-invert max-w-none break-words w-full px-2";
                    bubble.innerHTML = DOMPurify.sanitize(marked.parse(content || ''));
                }

                bubbleContainer.appendChild(bubble);
                div.appendChild(avatar);
                div.appendChild(bubbleContainer);
                
                els.chatContainer.appendChild(div);
                return bubble; // Return bubble to update it during streaming
            };

            const generateTitle = (firstMessage) => {
                const words = firstMessage.trim().split(/\s+/).slice(0, 5).join(' ');
                return words.length > 0 ? words + (firstMessage.length > words.length ? '...' : '') : 'New Chat';
            };

            // ==========================================
            // API INTEGRATION (STREAMING)
            // ==========================================
            const sendMessage = async () => {
                const text = els.messageInput.value.trim();
                if (!text) return;
                
                if (!state.settings.apiKey) {
                    alert("Welcome To Glossy AI.");
                    openSettings();
                    return;
                }

                const chat = getCurrentChat();
                if (!chat) return;

                // UI Updates
                els.messageInput.value = '';
                autoResizeTextarea();
                els.welcomeScreen.classList.add('hidden');
                
                // Set Title if new chat
                if (chat.messages.length === 0) {
                    chat.title = generateTitle(text);
                    renderChatList();
                }

                // Add User Message
                chat.messages.push({ role: 'user', content: text });
                chat.updatedAt = Date.now();
                appendMessageDOM('user', text);
                saveData();
                scrollToBottom();

                // Prepare API Payload
                const payloadMessages = [];
                if (state.settings.systemPrompt.trim() !== '') {
                    payloadMessages.push({ role: 'system', content: state.settings.systemPrompt });
                }
                // Only send last 10 messages to save context/tokens
                const recentMessages = chat.messages.slice(-10).map(m => ({ role: m.role, content: m.content }));
                payloadMessages.push(...recentMessages);

                // UI Loading state
                els.sendBtn.classList.add('hidden');
                els.stopBtn.classList.remove('hidden');
                els.messageInput.disabled = true;
                
                // Create empty AI message DOM
                const aiBubbleDom = appendMessageDOM('assistant', '');
                let fullAiResponse = '';
                
                // Add blinking cursor
                aiBubbleDom.innerHTML = '<span class="animate-pulse">●</span>';
                scrollToBottom();

                abortController = new AbortController();

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${state.settings.apiKey}`,
                            'HTTP-Referer': window.location.href, // Required by OpenRouter
                            'X-Title': 'Universal AI Chat' // Required by OpenRouter
                        },
                        body: JSON.stringify({
                            model: state.settings.model || 'deepseek/deepseek-r1:free',
                            messages: payloadMessages,
                            stream: true
                        }),
                        signal: abortController.signal
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || `HTTP error! status: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // Keep incomplete line in buffer

                        for (const line of lines) {
                            const trimmedLine = line.trim();
                            if (trimmedLine === '' || trimmedLine === 'data: [DONE]') continue;
                            
                            if (trimmedLine.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(trimmedLine.slice(6));
                                    const token = data.choices?.[0]?.delta?.content || '';
                                    if (token) {
                                        fullAiResponse += token;
                                        // Update DOM with parsed markdown
                                        aiBubbleDom.innerHTML = DOMPurify.sanitize(marked.parse(fullAiResponse));
                                        
                                        // Auto scroll down smartly
                                        const { scrollTop, scrollHeight, clientHeight } = els.chatContainer;
                                        if (scrollHeight - scrollTop - clientHeight < 150) {
                                            scrollToBottom();
                                        }
                                    }
                                } catch (e) {
                                    console.warn("SSE Parsing error", e, trimmedLine);
                                }
                            }
                        }
                    }

                } catch (error) {
                    if (error.name === 'AbortError') {
                        fullAiResponse += '\n\n*[Stopped by user]*';
                    } else {
                        console.error("API Error:", error);
                        fullAiResponse += `\n\n**Error:** ${error.message}`;
                    }
                    aiBubbleDom.innerHTML = DOMPurify.sanitize(marked.parse(fullAiResponse));
                } finally {
                    // Finalize
                    abortController = null;
                    if (fullAiResponse.trim() !== '') {
                        chat.messages.push({ role: 'assistant', content: fullAiResponse });
                        chat.updatedAt = Date.now();
                        saveData();
                        renderChatList();
                    }
                    
                    els.stopBtn.classList.add('hidden');
                    els.messageInput.disabled = false;
                    els.messageInput.focus();
                    autoResizeTextarea();
                    scrollToBottom();
                }
            };

            const stopGeneration = () => {
                if (abortController) {
                    abortController.abort();
                }
            };

            // ==========================================
            // SETTINGS MODAL
            // ==========================================
            const openSettings = () => {
                els.apiKeyInput.value = state.settings.apiKey;
                els.modelInput.value = state.settings.model;
                els.systemPromptInput.value = state.settings.systemPrompt;
                
                els.settingsModal.classList.remove('hidden');
                // Trigger animation
                setTimeout(() => {
                    els.settingsModal.classList.remove('opacity-0');
                    els.settingsModal.querySelector('div').classList.remove('scale-95');
                }, 10);
            };

            const closeSettings = () => {
                els.settingsModal.classList.add('opacity-0');
                els.settingsModal.querySelector('div').classList.add('scale-95');
                setTimeout(() => els.settingsModal.classList.add('hidden'), 200);
            };

            const saveSettings = () => {
                state.settings.apiKey = els.apiKeyInput.value.trim();
                state.settings.model = els.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
                state.settings.systemPrompt = els.systemPromptInput.value.trim();
                saveData();
                closeSettings();
            };

            // ==========================================
            // EVENT LISTENERS
            // ==========================================
            els.hamburgerBtn.addEventListener('click', () => toggleSidebar(true));
            els.closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));
            els.sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
            
            els.newChatBtn.addEventListener('click', createNewChat);
            els.themeToggle.addEventListener('click', toggleTheme);
            
            els.settingsBtn.addEventListener('click', openSettings);
            els.closeSettingsBtn.addEventListener('click', closeSettings);
            els.cancelSettingsBtn.addEventListener('click', closeSettings);
            els.saveSettingsBtn.addEventListener('click', saveSettings);
            
            els.messageInput.addEventListener('input', autoResizeTextarea);
            els.messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!els.sendBtn.classList.contains('hidden') && !els.messageInput.disabled) {
                        sendMessage();
                    }
                }
            });
            els.sendBtn.addEventListener('click', sendMessage);
            els.stopBtn.addEventListener('click', stopGeneration);

            // ==========================================
            // INITIALIZATION
            // ==========================================
            const init = () => {
                try {
                    // Configure Marked.js with code highlighting basic structure
                    marked.setOptions({
                        breaks: true,
                        gfm: true
                    });

                    loadData();
                    applyTheme();
                    renderChatList();
                    renderCurrentChat();
                    
                    // Hide Loader, Show App
                    els.loading.classList.add('hidden');
                    els.app.classList.remove('hidden');
                    
                    autoResizeTextarea();
                    
                    // Handle responsive sidebar on resize
                    window.addEventListener('resize', () => {
                        if (window.innerWidth >= 768) {
                            els.sidebar.classList.remove('-translate-x-full');
                            els.sidebarOverlay.classList.add('hidden');
                        } else {
                            els.sidebar.classList.add('-translate-x-full');
                        }
                    });

                } catch (error) {
                    console.error("Initialization failed:", error);
                    els.loading.innerHTML = `<div class="text-red-500 p-4 text-center">Failed to load application.<br>${error.message}</div>`;
                }
            };

            // Run init after a tiny delay to ensure DOM is ready
            setTimeout(init, 100);

        })();
    </script>
</body>
</html>
